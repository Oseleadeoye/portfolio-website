<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="80" fill="url(#bgGrad)"/>
  
  <!-- Inner border -->
  <rect x="16" y="16" width="480" height="480" rx="72" fill="none" stroke="rgba(15, 32, 39, 0.1)" stroke-width="2"/>
  
  <!-- OA Text -->
  <text x="256" y="340" font-family="'Cormorant Garamond', Georgia, serif" font-size="240" font-weight="600" fill="#0f2027" text-anchor="middle" letter-spacing="-12">OA</text>
</svg>
