<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osele Adeoye - Website Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }

        .banner {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            border-radius: 50%;
        }

        .banner::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(44, 83, 100, 0.3) 0%, transparent 70%);
            border-radius: 50%;
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 80px;
            gap: 60px;
        }

        .logo {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #ffffff 0%, #e8e8e8 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 80px;
            font-weight: 600;
            color: #0f2027;
            letter-spacing: -4px;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            position: relative;
            flex-shrink: 0;
            transform: rotate(-2deg);
        }

        .logo::before {
            content: '';
            position: absolute;
            inset: 8px;
            border-radius: 18px;
            border: 1px solid rgba(15, 32, 39, 0.1);
        }

        .text-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 76px;
            font-weight: 300;
            color: #ffffff;
            line-height: 1.1;
            letter-spacing: 1px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .name strong {
            font-weight: 600;
        }

        .accent-line {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, #b8d4e0 0%, transparent 100%);
        }

        .corner-decoration {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 1px solid rgba(184, 212, 224, 0.2);
        }

        .corner-top-left {
            top: 40px;
            left: 40px;
            border-right: none;
            border-bottom: none;
        }

        .corner-bottom-right {
            bottom: 40px;
            right: 40px;
            border-left: none;
            border-top: none;
        }

        .download-hint {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 24px;
            border-radius: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            color: #0f2027;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        @media (max-width: 1250px) {
            .banner {
                transform: scale(0.8);
            }
        }

        @media (max-width: 1000px) {
            .banner {
                transform: scale(0.6);
            }
        }

        @media (max-width: 768px) {
            .banner {
                transform: scale(0.5);
            }
        }
    </style>
</head>
<body>
    <div class="download-hint">
        Right-click and "Save image as..." → og-image.png (1200×630px for social sharing)
    </div>

    <div class="banner">
        <div class="corner-decoration corner-top-left"></div>
        <div class="corner-decoration corner-bottom-right"></div>
        
        <div class="content">
            <div class="logo">OA</div>
            
            <div class="text-content">
                <h1 class="name">
                    <strong>Osele</strong> Adeoye
                </h1>
                <div class="accent-line"></div>
            </div>
        </div>
    </div>
</body>
</html>
